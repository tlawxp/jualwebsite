<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>CodeMarket - Jual Source Code Premium</title>
    <!-- Font Awesome 6 (free) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-inner">
        <div class="logo"><i class="fas fa-code"></i> CodeTlawXp</div>
        <div class="nav-controls">
          <button class="dark-toggle" id="darkModeBtn">
            <i class="fas fa-moon"></i> <span>Mode Gelap</span>
          </button>
        </div>
      </div>
    </nav>

    <section class="hero">
      <div class="container">
        <h1>Jual Source Code Premium</h1>
        <p>
          Dapatkan source code terbaik untuk project Anda. Mulai dari Laravel,
          React, Mobile, hingga Fullstack.
        </p>
      </div>
    </section>

    <div class="container">
      <div class="search-filter">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Cari source code..."
          />
        </div>
        <div class="filter-group" id="filterGroup">
          <button data-category="all" class="filter-btn active">Semua</button>
          <button data-category="laravel" class="filter-btn">Laravel</button>
          <button data-category="react" class="filter-btn">React</button>
          <button data-category="mobile" class="filter-btn">Mobile</button>
          <button data-category="fullstack" class="filter-btn">
            Fullstack
          </button>
        </div>
      </div>

      <div id="productsContainer" class="products-grid"></div>
      <div class="load-more-container" id="loadMoreWrapper">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
      </div>
    </div>

    <footer>
      <p>
        &copy; 2025 CodeMarket - Jual source code berkualitas tinggi. Hubungi
        via WhatsApp untuk pembelian.
      </p>
    </footer>

    <!-- Modal Detail -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <h3 id="modalTitle"></h3>
        <p
          id="modalDesc"
          style="margin: 0.75rem 0; color: var(--text-secondary)"
        ></p>
        <div><span class="card-category" id="modalCategory"></span></div>
        <div class="modal-price" id="modalPrice"></div>
        <a href="#" id="whatsappLink" class="whatsapp-btn" target="_blank">
          <i class="fab fa-whatsapp"></i> Beli via WhatsApp
        </a>
      </div>
    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
